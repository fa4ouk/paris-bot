name: Agent Paris Sportifs

on:
  schedule:
    - cron: '30 8 * * *'   # 9h30 heure tunisienne (UTC+1)
    - cron: '0 20 * * *'   # 21h00 heure tunisienne
  workflow_dispatch:         # Permet de lancer manuellement depuis GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement de l'agent
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL: ${{ secrets.BANKROLL }}
        run: python agent.py
