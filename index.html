<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paris Pro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #8888a0;
    --dim: #555568;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.08);
    --green-bd: rgba(34,197,94,0.2);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.08);
    --red-bd: rgba(239,68,68,0.2);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.08);
    --blue-bd: rgba(96,165,250,0.2);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.08);
    --amber-bd: rgba(245,158,11,0.2);
    --accent: #6366f1;
    --r: 10px;
    --rs: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; position: fixed; height: 100vh; }
  .main { margin-left: 220px; flex: 1; padding: 2rem; max-width: 900px; }

  .logo { font-size: 15px; font-weight: 600; padding: 0.5rem 0.75rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
  .nav-sep { height: 1px; background: var(--border); margin: 6px 0; }
  .sidebar-bottom { margin-top: auto; }

  .bk-toggle { display: flex; align-items: center; gap: 8px; padding: 0.6rem 0.75rem; border-radius: var(--rs); color: var(--muted); cursor: pointer; font-size: 12px; user-select: none; }
  .bk-toggle:hover { color: var(--text); }
  .toggle { width: 28px; height: 16px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(12px); }

  .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 20px; font-weight: 600; }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); background: var(--green-bg); border: 1px solid var(--green-bd); padding: 5px 12px; border-radius: 20px; }
  .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.75rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .warn { color: var(--amber); }

  .section { margin-bottom: 1.75rem; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .section-count { font-size: 12px; color: var(--dim); background: var(--surface2); padding: 2px 8px; border-radius: 20px; }

  .pari-list { display: flex; flex-direction: column; gap: 10px; }
  .pari-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 1.1rem 1.25rem; transition: border-color 0.15s; }
  .pari-card:hover { border-color: var(--border2); }
  .pari-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
  .b-safe { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
  .b-valeur { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-bd); }
  .b-opport { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
  .b-neutral { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .status { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
  .s-win { background: var(--green-bg); color: var(--green); }
  .s-loss { background: var(--red-bg); color: var(--red); }
  .s-pending { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .pari-match { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .pari-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .pari-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .field-label { font-size: 11px; color: var(--dim); margin-bottom: 3px; }
  .field-value { font-size: 13px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .pari-raison { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); font-style: italic; }

  .perf-list { display: flex; flex-direction: column; gap: 10px; }
  .perf-row { display: flex; align-items: center; gap: 12px; }
  .perf-label { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; }
  .perf-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .perf-bar { height: 100%; border-radius: 3px; transition: width 1s ease; }
  .perf-val { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 500; width: 36px; text-align: right; }

  .note-box { font-size: 13px; color: var(--muted); background: var(--surface); border-radius: var(--r); padding: 12px 16px; border-left: 3px solid var(--accent); }

  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); font-size: 13px; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .blur { filter: blur(6px); user-select: none; pointer-events: none; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 1rem; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .pari-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><div class="logo-dot"></div>Paris Pro</div>
    <div class="nav-sep"></div>
    <div class="sidebar-bottom">
      <div class="bk-toggle" id="bkToggle">
        <div class="toggle" id="bkDot"></div>
        <span id="bkLabel">Masquer bankroll</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Bons plans du jour</div>
        <div class="page-sub" id="dateLabel">Chargement...</div>
      </div>
      <div class="live-badge"><div class="live-dot"></div><span id="liveBadge">Chargement...</span></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Bankroll</div>
        <div class="stat-value bk-val" id="statBankroll">— TND</div>
        <div class="stat-sub bk-val" id="statMise">Mise du jour : —</div>
      </div>
      <div class="stat">
        <div class="stat-label">Paris générés</div>
        <div class="stat-value" id="statCount">—</div>
        <div class="stat-sub" id="statDate">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">EV moyen</div>
        <div class="stat-value up" id="statEV">—</div>
        <div class="stat-sub">Expected Value</div>
      </div>
      <div class="stat">
        <div class="stat-label">Confiance</div>
        <div class="stat-value" id="statConfiance">—</div>
        <div class="stat-sub" id="statConfianceSub">—</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Paris du jour</div>
        <div class="section-count" id="parisCount">—</div>
      </div>
      <div class="pari-list" id="pariList">
        <div class="loading"><div class="spinner"></div>Chargement des paris...</div>
      </div>
    </div>

    <div class="section" id="perfSection" style="display:none;">
      <div class="section-header"><div class="section-title">Répartition du jour</div></div>
      <div class="perf-list" id="perfList"></div>
    </div>

    <div class="section" id="noteSection" style="display:none;">
      <div class="note-box" id="noteBox"></div>
    </div>
  </main>
</div>

<script>
const GITHUB_USER = 'iamfxrouk';
const GITHUB_REPO = 'paris-bot';
const JSON_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/paris.json`;

const TYPE_CLASS = { 'ULTRA SAFE': 'b-safe', 'VALEUR': 'b-valeur', 'OPPORTUNISTE': 'b-opport' };
const TYPE_LABEL = { 'ULTRA SAFE': '🛡 Ultra Safe', 'VALEUR': '💎 Valeur', 'OPPORTUNISTE': '🎯 Opportuniste' };
const CONFIANCE_COLOR = { 'Élevé': 'up', 'Moyen': 'warn', 'Faible': 'down' };

let bkHidden = false;
let bankroll = 100;

function setBkHidden(hidden) {
  bkHidden = hidden;
  document.getElementById('bkDot').classList.toggle('on', hidden);
  document.getElementById('bkLabel').textContent = hidden ? 'Afficher bankroll' : 'Masquer bankroll';
  document.querySelectorAll('.bk-val').forEach(el => el.classList.toggle('blur', hidden));
}
document.getElementById('bkToggle').addEventListener('click', () => setBkHidden(!bkHidden));

function makeCard(pari) {
  const type = pari.type || 'PARI';
  const style = pari.style || 'Simple';
  const typeClass = TYPE_CLASS[type] || 'b-neutral';
  const typeLabel = TYPE_LABEL[type] || type;
  const mise = pari.mise_tnd ? pari.mise_tnd.toFixed(2) + ' TND' : '—';
  const ev = pari.ev_pct ? '+' + pari.ev_pct + '%' : '—';

  return `
  <div class="pari-card">
    <div class="pari-top">
      <div class="badges">
        <span class="badge ${typeClass}">${typeLabel}</span>
        <span class="badge b-neutral">${style}</span>
      </div>
      <span class="status s-pending">En attente</span>
    </div>
    <div class="pari-match">${pari.match || '—'}</div>
    <div class="pari-meta">
      <span>🏆 ${pari.competition || '—'}</span>
      <span>⏰ ${pari.heure || '—'}</span>
    </div>
    <div class="pari-grid">
      <div><div class="field-label">Sélection</div><div class="field-value">${pari.selection || '—'}</div></div>
      <div><div class="field-label">Cote</div><div class="field-value">${pari.cote || '—'}</div></div>
      <div><div class="field-label">Mise</div><div class="field-value bk-val">${mise}</div></div>
      <div><div class="field-label">EV estimé</div><div class="field-value up">${ev}</div></div>
    </div>
    ${pari.raison ? `<div class="pari-raison">${pari.raison}</div>` : ''}
  </div>`;
}

async function loadData() {
  try {
    const r = await fetch(JSON_URL, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!r.ok) throw new Error('Fichier non trouvé');
    const ghData = await r.json();
    const cleaned = ghData.content.split('\n').join('');
    const decoded = atob(cleaned);
    const data = JSON.parse(decoded);

    const paris = data.paris || [];
    const note = data.note_du_jour || '';
    const confiance = data.confiance || '—';

    // Date
    const now = new Date();
    document.getElementById('dateLabel').textContent = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' }) + ' — ' + now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    document.getElementById('liveBadge').textContent = 'Coupe du Monde active';

    // Bankroll
    bankroll = parseFloat(localStorage.getItem('bankroll') || '100');
    const totalMise = paris.reduce((s, p) => s + (p.mise_tnd || 0), 0);
    document.getElementById('statBankroll').textContent = bankroll.toFixed(0) + ' TND';
    document.getElementById('statMise').textContent = 'Mise du jour : ' + totalMise.toFixed(2) + ' TND';

    // Stats
    document.getElementById('statCount').textContent = paris.length;
    document.getElementById('statDate').textContent = data.date || '—';
    const avgEV = paris.length ? (paris.reduce((s,p) => s + (p.ev_pct || 0), 0) / paris.length).toFixed(1) : '—';
    document.getElementById('statEV').textContent = avgEV !== '—' ? '+' + avgEV + '%' : '—';

    const confEl = document.getElementById('statConfiance');
    confEl.textContent = confiance;
    confEl.className = 'stat-value ' + (CONFIANCE_COLOR[confiance] || '');
    document.getElementById('statConfianceSub').textContent = paris.length + ' paris générés';

    // Paris
    const list = document.getElementById('pariList');
    document.getElementById('parisCount').textContent = paris.length + ' paris';
    if (paris.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Aucun paris généré aujourd\'hui.</div>';
    } else {
      list.innerHTML = paris.map(makeCard).join('');
    }

    // Perf par type
    const types = ['ULTRA SAFE', 'VALEUR', 'OPPORTUNISTE'];
    const counts = {};
    types.forEach(t => counts[t] = paris.filter(p => p.type === t).length);
    const total = paris.length || 1;
    const perfColors = { 'ULTRA SAFE': 'var(--green)', 'VALEUR': 'var(--blue)', 'OPPORTUNISTE': 'var(--amber)' };
    if (paris.length > 0) {
      document.getElementById('perfSection').style.display = '';
      document.getElementById('perfList').innerHTML = types.map(t => `
        <div class="perf-row">
          <div class="perf-label">${TYPE_LABEL[t]}</div>
          <div class="perf-bg"><div class="perf-bar" style="width:${Math.round(counts[t]/total*100)}%;background:${perfColors[t]};"></div></div>
          <div class="perf-val">${counts[t]}</div>
        </div>`).join('');
    }

    // Note
    if (note) {
      document.getElementById('noteSection').style.display = '';
      document.getElementById('noteBox').textContent = '📝 ' + note;
    }

    // Réapplique blur si actif
    if (bkHidden) setBkHidden(true);

  } catch (e) {
    document.getElementById('pariList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⏳</div>
        Aucun paris disponible pour l'instant.<br>
        <span style="font-size:12px;margin-top:6px;display:block;">L'agent tourne à 9h30 et 21h00 chaque jour.</span>
      </div>`;
    document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    document.getElementById('liveBadge').textContent = 'En attente de l\'agent';
  }
}

loadData();
</script>
</body>
</html>
